<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <title>Cadastro | DMS</title>
  </head>
  <body>
    <main class="card">
      <h1 class="title">Cadastro de Usuário</h1>
      <input class="user-input" id="user-name" placeholder="Digite o nome do usuário.">
      <input class="user-input" id="user-email" placeholder="Digite o email do usuário." type="email">
      <div class="actions">
        <button class="action-button action-button-primary" id="save-button">Salvar</button>
        <button class="action-button action-button-secondary" id="clear-button">Limpar</button>
      </div>
      <section class="result" id="result"></section>
      <section class="user-list">
          <table class="user-table">
              <thead>
                  <tr>
                      <th>Nome</th>
                      <th>Email</th>
                      <th>Ações</th>
                  </tr>
              </thead>
              <tbody id="users-table-body">
                  
              </tbody>
          </table>
      </section>
    </main>
    <script src="/assets/js/main.js"></script>
  </body>
</html>
